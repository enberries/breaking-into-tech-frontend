<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <!-- Replace Google logo with a custom code-related logo -->
      <svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      <div class="logo-text">CodeHub</div>
    </div>
    
    <h1 class="title">{{ step === 'email' ? 'Sign in' : 'Welcome' }}</h1>
    <p class="subtitle" *ngIf="step === 'email'">Enter your account details</p>
    <p class="subtitle" *ngIf="step === 'password'">{{ userEmail }}</p>
    
    <form [formGroup]="loginForm" (ngSubmit)="step === 'email' ? onNextStep() : onLogin()">
      <div class="form-field" *ngIf="step === 'email'">
        <label for="email">Email or phone</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          autocomplete="email">
        <div class="error-message" *ngIf="emailControl?.invalid && emailControl?.touched">
          Please enter a valid email address
        </div>
      </div>
      
      <div class="form-field" *ngIf="step === 'password'">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          autocomplete="current-password">
        <div class="error-message" *ngIf="passwordControl?.invalid && passwordControl?.touched">
          Password must be at least 6 characters
        </div>
      </div>
      
      <div class="error-alert" *ngIf="error">{{ error }}</div>
      
      <div class="form-options">
        <a href="javascript:void(0)" class="option-link">
          {{ step === 'email' ? 'Forgot email?' : 'Forgot password?' }}
        </a>
        
        <div class="spacer"></div>
        
        <button 
          *ngIf="step === 'password'" 
          type="button" 
          class="back-button"
          (click)="onBack()">
          Back
        </button>
        
        <button 
          type="submit" 
          class="next-button" 
          [disabled]="(step === 'email' && emailControl?.invalid) || 
                       (step === 'password' && passwordControl?.invalid) || 
                       loading">
          {{ step === 'email' ? 'Next' : 'Sign in' }}
          <div class="loader" *ngIf="loading"></div>
        </button>
      </div>
    </form>
    
    <div class="create-account">
      <span>Don't have an account?</span>
      <a (click)="navigateToRegister()" class="create-link">Create account</a>
    </div>
  </div>
</div>
